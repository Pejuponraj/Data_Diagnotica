<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Diagnotica HMS — Appointments</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --brand:#1A5EAB;--brand-dark:#0F3F78;--brand-light:#E8F1FB;
  --accent:#00C0A3;--accent-lt:#E0F9F5;
  --warn:#F59E0B;--warn-lt:#FEF3C7;--warn-dark:#92400E;
  --danger:#EF4444;--danger-lt:#FEE2E2;
  --success:#10B981;--success-lt:#D1FAE5;--success-dark:#065F46;
  --purple:#7C3AED;--purple-lt:#EDE9FE;
  --text-1:#0F1C2E;--text-2:#3A4D63;--text-3:#7A8FA6;
  --border:#DDE6F0;--bg:#F0F5FB;--surface:#fff;--surface-2:#F7FAFD;
  --radius:10px;--radius-lg:16px;
  --shadow:0 1px 4px rgba(26,94,171,.08),0 4px 16px rgba(26,94,171,.06);
  --shadow-lg:0 8px 32px rgba(26,94,171,.14);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text-1);min-height:100vh;font-size:14px;}
.topbar{background:var(--brand-dark);display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:52px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.18);}
.logo-wrap{display:flex;align-items:center;gap:10px;}
.logo-mark{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,#00C0A3,#2E7DD6);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;}
.logo-text{color:#fff;font-size:15px;font-weight:700;}
.logo-sub{color:#8BAFD4;font-size:11px;}
.topbar-right{display:flex;align-items:center;gap:10px;}
.t-chip{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);color:#D4E8FF;border-radius:6px;padding:5px 12px;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:6px;transition:background .15s;font-family:inherit;}
.t-chip:hover{background:rgba(255,255,255,.18);}
.user-chip{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.08);border-radius:20px;padding:4px 12px 4px 4px;}
.user-av{width:26px;height:26px;border-radius:50%;background:var(--accent);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;}
.shell{display:flex;height:calc(100vh - 52px);overflow:hidden;}
.sidebar{width:196px;background:var(--surface);border-right:1px solid var(--border);padding:14px 0;flex-shrink:0;overflow-y:auto;}
.sb-label{font-size:10px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.08em;padding:8px 14px 4px;}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 12px;border-radius:var(--radius);margin:0 8px 2px;cursor:pointer;color:var(--text-2);font-size:13px;transition:all .15s;position:relative;}
.nav-item:hover{background:var(--brand-light);color:var(--brand);}
.nav-item.active{background:var(--brand-light);color:var(--brand);font-weight:600;}
.nav-item.active::before{content:'';position:absolute;left:-4px;top:6px;bottom:6px;width:3px;background:var(--brand);border-radius:0 3px 3px 0;}
.nb{margin-left:auto;font-size:10px;font-weight:700;border-radius:10px;padding:1px 6px;color:#fff;}
.nb-b{background:var(--brand);}.nb-g{background:var(--success);}.nb-r{background:var(--danger);}.nb-w{background:var(--warn);color:var(--warn-dark);}
.main{flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:16px;}
.card{background:var(--surface);border-radius:var(--radius-lg);border:1px solid var(--border);box-shadow:var(--shadow);overflow:hidden;}
.card-header{padding:12px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--surface-2);}
.card-title{font-size:14px;font-weight:700;display:flex;align-items:center;gap:8px;}
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:10px;font-size:11px;font-weight:600;}
.bd-blue{background:var(--brand-light);color:var(--brand);}
.bd-green{background:var(--success-lt);color:var(--success);}
.bd-warn{background:var(--warn-lt);color:var(--warn-dark);}
.bd-red{background:var(--danger-lt);color:var(--danger);}
.btn{padding:7px 14px;border-radius:var(--radius);border:none;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:all .15s;}
.btn-primary{background:var(--brand);color:#fff;}
.btn-primary:hover{background:var(--brand-dark);}
.btn-outline{background:var(--surface);color:var(--brand);border:1.5px solid var(--brand);}
.btn-outline:hover{background:var(--brand-light);}
.btn-success{background:var(--success);color:#fff;}
.btn-sm{padding:5px 11px;font-size:12px;}

/* KPI STRIP */
.kpi-strip{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;}
.kpi-card{background:var(--surface);border-radius:var(--radius-lg);border:1px solid var(--border);box-shadow:var(--shadow);padding:16px;cursor:pointer;transition:all .18s;text-align:center;}
.kpi-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg);}
.kc-icon{font-size:22px;margin-bottom:6px;}
.kc-val{font-size:26px;font-weight:800;line-height:1;margin-bottom:2px;}
.kc-label{font-size:11px;color:var(--text-3);}
.kc-trend{font-size:11px;font-weight:600;margin-top:4px;}
.trend-up{color:var(--success);}
.trend-down{color:var(--danger);}

/* TWO COL */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;}

/* CALENDAR */
.cal-header{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;border-bottom:1px solid var(--border);}
.cal-nav-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:var(--surface-2);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .13s;}
.cal-nav-btn:hover{background:var(--brand-light);border-color:var(--brand);}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:0;}
.cal-day-label{padding:8px 4px;text-align:center;font-size:11px;font-weight:700;color:var(--text-3);background:var(--surface-2);border-bottom:1px solid var(--border);}
.cal-day{padding:6px 4px;min-height:72px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);font-size:11px;cursor:pointer;transition:background .13s;position:relative;}
.cal-day:hover{background:var(--brand-light);}
.cal-day.today{background:var(--brand-light);}
.cal-day.today .cal-date{color:var(--brand);font-weight:700;}
.cal-day.other-month{opacity:.35;}
.cal-date{font-size:12px;font-weight:600;margin-bottom:3px;}
.cal-appt-dot{display:flex;gap:2px;flex-wrap:wrap;margin-top:2px;}
.cal-dot{width:6px;height:6px;border-radius:50%;}
.cal-appt-chip{font-size:9px;font-weight:600;padding:1px 5px;border-radius:4px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;}

/* TIME SLOTS */
.time-grid{display:flex;flex-direction:column;gap:0;max-height:420px;overflow-y:auto;}
.time-row{display:flex;align-items:center;gap:10px;padding:6px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .13s;}
.time-row:hover{background:var(--brand-light);}
.time-label{font-family:'DM Mono',monospace;font-size:11px;color:var(--text-3);min-width:48px;flex-shrink:0;}
.time-slot-item{flex:1;border-radius:7px;padding:5px 10px;font-size:12px;font-weight:500;}
.ts-booked{background:var(--brand-light);color:var(--brand);border:1px solid #BFDBFE;}
.ts-free{background:var(--success-lt);color:var(--success-dark);border:1px solid #6EE7B7;}
.ts-blocked{background:var(--surface-2);color:var(--text-3);border:1px solid var(--border);}
.ts-emergency{background:var(--danger-lt);color:var(--danger);border:1px solid #FCA5A5;}

/* QUEUE */
.queue-item{display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .13s;}
.queue-item:hover{background:var(--brand-light);}
.queue-item:last-child{border-bottom:none;}
.qi-token{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff;flex-shrink:0;}
.qi-name{font-size:13px;font-weight:600;flex:1;}
.qi-meta{font-size:11px;color:var(--text-3);}
.qi-status{font-size:10px;font-weight:700;padding:3px 9px;border-radius:8px;}
.qs-waiting{background:var(--warn-lt);color:var(--warn-dark);}
.qs-in-progress{background:var(--success-lt);color:var(--success-dark);}
.qs-called{background:var(--brand-light);color:var(--brand);}
.qs-missed{background:var(--danger-lt);color:var(--danger);}
.qi-wait{font-family:'DM Mono',monospace;font-size:11px;color:var(--text-3);flex-shrink:0;}

/* UPCOMING TABLE */
.appt-table{width:100%;border-collapse:collapse;font-size:12px;}
.appt-table th{padding:9px 14px;background:var(--surface-2);text-align:left;font-size:10px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.06em;border-bottom:2px solid var(--border);}
.appt-table td{padding:10px 14px;border-bottom:1px solid var(--border);vertical-align:middle;}
.appt-table tr:hover td{background:var(--brand-light);cursor:pointer;}
.appt-status{font-size:10px;font-weight:700;padding:3px 9px;border-radius:8px;}
.as-confirmed{background:var(--success-lt);color:var(--success-dark);}
.as-pending{background:var(--warn-lt);color:var(--warn-dark);}
.as-cancelled{background:var(--danger-lt);color:var(--danger);}
.as-completed{background:var(--brand-light);color:var(--brand);}

/* WIZARD / MODAL */
.modal-backdrop{position:fixed;inset:0;background:rgba(15,28,46,.5);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;}
.modal-backdrop.show{opacity:1;pointer-events:all;}
.modal{background:var(--surface);border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);width:540px;max-width:94vw;max-height:92vh;overflow-y:auto;transform:scale(.97) translateY(16px);transition:transform .25s cubic-bezier(.34,1.4,.64,1);}
.modal-backdrop.show .modal{transform:none;}
.modal-header{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--surface-2);position:sticky;top:0;z-index:2;}
.modal-title{font-size:15px;font-weight:700;}
.modal-close{width:28px;height:28px;border-radius:7px;border:1px solid var(--border);background:var(--surface);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;font-family:inherit;}
.modal-body{padding:20px;}
.modal-footer{padding:12px 20px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;background:var(--surface-2);}

/* STEPPER */
.stepper{display:flex;align-items:center;margin-bottom:20px;}
.step-item{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1;position:relative;}
.step-item:not(:last-child)::after{content:'';position:absolute;top:14px;left:60%;width:80%;height:2px;background:var(--border);}
.step-item.done:not(:last-child)::after,.step-item.active:not(:last-child)::after{background:var(--brand);}
.step-circle{width:28px;height:28px;border-radius:50%;border:2px solid var(--border);background:var(--surface-2);color:var(--text-3);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;position:relative;z-index:1;}
.step-item.done .step-circle{background:var(--brand);border-color:var(--brand);color:#fff;}
.step-item.active .step-circle{background:var(--brand-light);border-color:var(--brand);color:var(--brand);}
.step-label{font-size:10px;font-weight:600;color:var(--text-3);}
.step-item.active .step-label,.step-item.done .step-label{color:var(--brand);}

/* FORM */
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.form-group{display:flex;flex-direction:column;gap:4px;}
.form-group.full{grid-column:1/-1;}
.fl{font-size:11px;font-weight:600;color:var(--text-2);}
.fi,.fs{padding:8px 11px;border:1.5px solid var(--border);border-radius:var(--radius);font-family:inherit;font-size:13px;color:var(--text-1);background:var(--surface-2);outline:none;transition:border-color .15s;width:100%;}
.fi:focus,.fs:focus{border-color:var(--brand);background:#fff;}

/* DOC CARDS */
.doc-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;}
.doc-card{border-radius:var(--radius);border:2px solid var(--border);padding:10px;text-align:center;cursor:pointer;transition:all .15s;}
.doc-card:hover,.doc-card.sel{border-color:var(--brand);background:var(--brand-light);}
.doc-av{width:40px;height:40px;border-radius:50%;margin:0 auto 6px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;}
.doc-name{font-size:12px;font-weight:700;}
.doc-spec{font-size:10px;color:var(--text-3);}
.doc-slots{font-size:11px;font-weight:600;margin-top:4px;}

/* SLOT GRID */
.slot-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:14px;}
.slot-btn{padding:8px;border-radius:8px;border:1.5px solid var(--border);font-size:12px;font-weight:600;font-family:'
