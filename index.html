<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Diagnotica HMS</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --brand:#1A5EAB;--brand-dark:#0F3F78;--accent:#00C0A3;
  --success:#10B981;--warn:#F59E0B;--danger:#EF4444;
  --bg:#F0F4FA;--surface:#fff;--border:#DDE6F0;
  --text:#1E293B;--muted:#64748B;
  --radius:12px;--radius-lg:16px;
  --sidebar:260px;--topbar:56px;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;height:100vh;overflow:hidden}
.topbar{height:var(--topbar);background:var(--brand-dark);display:flex;align-items:center;padding:0 20px;gap:12px;flex-shrink:0;z-index:100}
.topbar-logo{display:flex;align-items:center;gap:10px}
.topbar-logo .icon{width:32px;height:32px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px}
.topbar-logo h1{color:#fff;font-size:18px;font-weight:700;letter-spacing:-0.3px}
.topbar-logo span{color:var(--accent);font-size:11px;font-weight:500;margin-left:4px;background:rgba(0,192,163,0.15);padding:2px 8px;border-radius:20px}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:16px}
.topbar-right .badge{background:rgba(255,255,255,0.12);color:#fff;font-size:12px;padding:4px 12px;border-radius:20px}
.topbar-right .avatar{width:32px;height:32px;background:var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:14px}
.layout{display:flex;flex:1;overflow:hidden}
.sidebar{width:var(--sidebar);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0}
.sidebar::-webkit-scrollbar{width:4px}
.sidebar::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.nav-section{padding:16px 12px 4px;font-size:10px;font-weight:700;color:var(--muted);letter-spacing:1px;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 16px;cursor:pointer;border-radius:10px;margin:1px 8px;font-size:13px;font-weight:500;color:var(--muted);transition:all .15s;border:none;background:none;width:calc(100% - 16px);text-align:left}
.nav-item:hover{background:var(--bg);color:var(--text)}
.nav-item.active{background:linear-gradient(135deg,var(--brand),#2272d9);color:#fff;box-shadow:0 2px 8px rgba(26,94,171,0.3)}
.nav-item .icon{font-size:16px;width:20px;text-align:center}
.nav-item .nbadge{margin-left:auto;background:var(--danger);color:#fff;font-size:10px;font-weight:700;padding:2px 6px;border-radius:10px}
.nav-item.active .nbadge{background:rgba(255,255,255,0.3)}
.content{flex:1;overflow:hidden;position:relative}
#module-frame{width:100%;height:100%;border:none;display:block}
#welcome{position:absolute;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:10}
#welcome .w-icon{font-size:64px}
#welcome h2{font-size:24px;font-weight:700;color:var(--brand-dark)}
#welcome p{color:var(--muted);font-size:14px}
#welcome .stats{display:flex;gap:16px;margin-top:8px}
#welcome .stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 24px;text-align:center}
#welcome .stat .num{font-size:28px;font-weight:700;color:var(--brand)}
#welcome .stat .lbl{font-size:12px;color:var(--muted);margin-top:2px}
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-logo">
    <div class="icon">🏥</div>
    <h1>Diagnotica<span>HMS</span></h1>
  </div>
  <div class="topbar-right">
    <span class="badge">🟢 Live Demo</span>
    <div class="avatar">A</div>
  </div>
</div>
<div class="layout">
  <div class="sidebar">
    <div class="nav-section">Core Modules</div>
    <button class="nav-item" onclick="load('01_PAS.html',this)"><span class="icon">👤</span>Patient Admin</button>
    <button class="nav-item" onclick="load('02_EMR.html',this)"><span class="icon">📋</span>EMR</button>
    <button class="nav-item" onclick="load('03_OPD.html',this)"><span class="icon">🏥</span>OPD</button>
    <button class="nav-item" onclick="load('04_ER.html',this)"><span class="icon">🚨</span>Emergency<span class="nbadge">3</span></button>
    <button class="nav-item" onclick="load('05_LIS.html',this)"><span class="icon">🔬</span>Laboratory</button>
    <button class="nav-item" onclick="load('06_RIS.html',this)"><span class="icon">📡</span>Radiology</button>
    <div class="nav-section">Finance</div>
    <button class="nav-item" onclick="load('07_Billing.html',this)"><span class="icon">💳</span>Billing</button>
    <button class="nav-item" onclick="load('08_Insurance.html',this)"><span class="icon">🛡️</span>Insurance</button>
    <div class="nav-section">Clinical</div>
    <button class="nav-item" onclick="load('09_OT.html',this)"><span class="icon">🔪</span>Operation Theatre</button>
    <button class="nav-item" onclick="load('10_IPD.html',this)"><span class="icon">🛏️</span>In-Patient</button>
    <button class="nav-item" onclick="load('11_Pharmacy.html',this)"><span class="icon">💊</span>Pharmacy</button>
    <button class="nav-item" onclick="load('14_BloodBank.html',this)"><span class="icon">🩸</span>Blood Bank<span class="nbadge">6</span></button>
    <button class="nav-item" onclick="load('15_Nursing.html',this)"><span class="icon">👩‍⚕️</span>Nursing</button>
    <div class="nav-section">Operations</div>
    <button class="nav-item" onclick="load('12_Compliance.html',this)"><span class="icon">✅</span>Compliance</button>
    <button class="nav-item" onclick="load('13_Appointments.html',this)"><span class="icon">📅</span>Appointments</button>
    <button class="nav-item" onclick="load('16_Inventory.html',this)"><span class="icon">📦</span>Inventory</button>
    <button class="nav-item" onclick="load('17_HR.html',this)"><span class="icon">👥</span>HR</button>
    <div class="nav-section">Insights</div>
    <button class="nav-item" onclick="load('18_Analytics.html',this)"><span class="icon">📊</span>Analytics</button>
    <button class="nav-item" onclick="load('19_PatientPortal.html',this)"><span class="icon">🌐</span>Patient Portal</button>
    <button class="nav-item" onclick="load('20_Telemedicine.html',this)"><span class="icon">📹</span>Telemedicine</button>
    <div class="nav-section">System</div>
    <button class="nav-item" onclick="load('21_Security.html',this)"><span class="icon">🔐</span>Security</button>
    <button class="nav-item" onclick="load('AI_LangGraph.html',this)"><span class="icon">🤖</span>AI Engine</button>
    <button class="nav-item" onclick="load('CRDT_Sync.html',this)"><span class="icon">🔄</span>CRDT Sync</button>
  </div>
  <div class="content">
    <div id="welcome">
      <div class="w-icon">🏥</div>
      <h2>Welcome to Diagnotica HMS</h2>
      <p>Select a module from the sidebar to get started</p>
      <div class="stats">
        <div class="stat"><div class="num">23</div><div class="lbl">Modules</div></div>
        <div class="stat"><div class="num">100%</div><div class="lbl">Uptime</div></div>
        <div class="stat"><div class="num">Live</div><div class="lbl">Status</div></div>
      </div>
    </div>
    <iframe id="module-frame" src="about:blank"></iframe>
  </div>
</div>
<script>
function load(file, btn) {
  document.getElementById('welcome').style.display = 'none';
  document.getElementById('module-frame').src = file;
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}
</script>
</body>
</html>
